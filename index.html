<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CURRENCY CONVERTER</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: rgb(76, 170, 120);
    }
    .container {
      background-color: #fff;
      padding: 2rem;
      border-radius: 1rem;
      min-height: 45vh;
      width: 40vh;
    }
    form {
      margin: 2rem 0 1rem 0;
    }
    form select,
    input,
    button {
      width: 100%;
      border-radius: 0.25rem;
    }
    form input {
      font-size: 1rem;
      height: 1.5rem;
      padding-left: 0.5rem;
    }
    .dropdown {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2rem;
      gap: 3rem;
      text-align: center;
    }
    .msg {
      padding-top: 2rem;
      padding-bottom: 1rem;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
    }
    form button {
      background-color: rgb(108, 14, 118);
      height: 3rem;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 0.5rem;
      cursor: pointer;
    }
    .container h2 {
      text-align: center;
    }
  </style>
  <body>
    <div class="container">
      <h2>Currency Converter</h2>
      <form>
        <div class="amount">
          <p style="margin-bottom: 0.5rem">Enter the amount</p>
          <input value="100" type="number" />
        </div>
        <div class="dropdown">
          <div class="from">
            <p>From</p>
            <div class="select-container">
              <img src="https://flagsapi.com/US/shiny/64.png" />
              <select name="from">
                <!-- <option value="USD">USD</option>
                <option value="Pkr">PKR</option>
                <option value="EU">EU</option>
                <option value="AUD">AUD</option> -->
              </select>
            </div>
          </div>
          <div class="to">
            <p>To</p>
            <div class="select-container">
              <img src="https://flagsapi.com/PK/shiny/64.png" />
              <select name="to">
                <!-- <option value="USD">USD</option>
                <option value="Pkr" selected>PKR</option>
                <option value="EU">EU</option>
                <option value="AUD">AUD</option> -->
              </select>
            </div>
          </div>
        </div>
        <div class="msg"></div>
        <button>Get Exchange Rate</button>
      </form>
    </div>

    <script type="module" src="currencyconverter.js"></script>
  </body>
</html>
